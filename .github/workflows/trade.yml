name: Dual Strategy Trader

on:
  schedule:
    # Every 5 minutes (GitHub Actions cron minimum)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # allow manual triggering

permissions:
  contents: write  # needed to commit v2_state.json back

concurrency:
  group: trader
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run trader
        env:
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
        run: python trader.py | tee -a run.log

      - name: Persist v2 state
        run: |
          if [[ -n "$(git status --porcelain v2_state.json)" ]]; then
            git config user.name "trader-bot"
            git config user.email "trader-bot@users.noreply.github.com"
            git add v2_state.json
            git commit -m "v2 state update [skip ci]"
            git push
          fi
